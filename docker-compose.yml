version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: roles_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 265
      MYSQL_DATABASE: roles_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db-init:/docker-entrypoint-initdb.d

  postgres:
    image: postgres:16
    container_name: roles_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 265
      POSTGRES_DB: roles_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: roles_backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  mysql_data:
  postgres_data: