version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: roles_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 0411
      MYSQL_DATABASE: roles_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 👇 aceita os dois caminhos (caso você ainda esteja migrando)
      - ./database:/docker-entrypoint-initdb.d
      - ./backend/db-init:/docker-entrypoint-initdb.d

  backend:
    build: .
    container_name: roles_backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    environment:
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 0411
      DB_NAME: roles_db
      PORT: 3000
      JWT_SECRET: minha_chave_secreta_segura

      # 👇 email (do segundo)
      EMAIL_USER: roles.suporte@gmail.com
      EMAIL_PASS: dxrz asij zxav cfip

    volumes:
      # 👇 uploads persistentes
      - ./backend/uploads:/app/uploads

volumes:
  mysql_data: