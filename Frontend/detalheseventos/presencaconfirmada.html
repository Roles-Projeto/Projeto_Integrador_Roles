<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presença Confirmada | Rolês</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/frontend/css/footer.css">
    <link rel="stylesheet" href="/frontend/css/presencaconfirmada.css">
</head>
<body>

<header>
    <div id="header-container"></div>
</header>

<main>
    <div class="container-confirmacao">

        <div class="icone-check-container">
            <div class="icone-check-ring">
                <svg class="icone-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill="currentColor"
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>
                </svg>
            </div>
        </div>

        <h1 class="titulo-confirmacao">Presença Confirmada!</h1>
        <p class="mensagem-confirmacao">Você confirmou presença no evento. Nos vemos lá!</p>

        <div class="card-lembrete">
            <h3>Lembre-se</h3>
            <ul>
                <li>Chegue 15 minutos antes do evento começar</li>
                <li>Enviamos um email com todos os detalhes</li>
                <li>Este não é um ingresso, apenas confirmação de interesse!</li>
            </ul>
        </div>

        <div class="acoes-finais">
            <a href="/frontend/eventos/eventos.html" class="botao-acao botao-explorar" role="button">
                <i class="fas fa-compass"></i> Explorar Mais Eventos
            </a>
            <button class="botao-acao botao-compartilhar" type="button">
                <i class="fas fa-share-alt"></i> Compartilhar
            </button>
        </div>

    </div>
</main>

<script src="/frontend/js/config.js"></script>
<script src="/frontend/js/footer.js" defer></script>
<script src="/frontend/js/loadHeader.js"></script>
<script src="/frontend/js/PresencaConfirmada.js"></script>

</body>
</html>
