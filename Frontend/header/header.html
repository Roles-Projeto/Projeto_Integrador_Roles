<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/header.css">

<header class="header-main">

    <nav class="navbar">

        <!-- LOGO -->
        <div class="logo">
            <a href="../index.html">Rolês</a>
        </div>

        <!-- BARRA DE BUSCA -->
        <div class="search-bar" id="search-bar-wrapper">

            <input
                type="text"
                id="search-input"
                placeholder="Buscar eventos..."
                autocomplete="off"
            />

            <div class="divider"></div>

            <div class="city-dropdown">
                <button class="city-btn" id="cityBtn">
                    <i class="fas fa-map-marker-alt"></i>
                    <span id="selectedCity">Minha localização</span>
                </button>
            </div>

            <button class="search-btn" id="btn-buscar">
                <img src="../Imagens/lupa.png" alt="Buscar">
            </button>

            <!-- DROPDOWN DE SUGESTÕES (estilo Indeed) -->
            <div id="search-suggestions"></div>

        </div>

        <!-- LADO DIREITO -->
        <div class="right-section">

            <div class="event-actions">
                <button class="action-btn">Criar evento</button>
                <button class="action-btn">Meus ingressos</button>
            </div>

            <!-- NÃO LOGADO -->
            <div id="header-nao-logado" class="user-action-btns">
                <a href="../login/login.html" class="login" id="openLogin">Entrar</a>
            </div>

            <!-- HAMBURGER (visível só quando logado) -->
            <button id="hamburger-btn" class="hamburger-btn" style="display:none;">
                <i class="fas fa-bars"></i>
            </button>

            <!-- LOGADO -->
            <div id="header-logado" class="user-profile-container" style="display: none;">

                <div class="profile-avatar">
                    <img id="profile-pic-header"
                         src="https://i.imgur.com/default-placeholder.png"
                         alt="Foto de Perfil"
                         class="avatar-img">
                </div>

                <div class="dropdown-menu">

                    <div class="user-info">
                        <img src="https://i.imgur.com/default-placeholder.png" alt="Foto de Perfil">
                        <div>
                            <strong id="profile-name-header">Nome do usuário</strong>
                            <span id="profile-email-header">email@email.com</span>
                        </div>
                    </div>

                    <hr>

                    <a href="../perfil/perfil.html" id="minha-conta" class="dropdown-item">
                        <i class="fas fa-user"></i> Minha conta
                    </a>

                    <a href="#" id="favoritos" class="dropdown-item">
                        <i class="fas fa-heart"></i> Favoritos
                    </a>

                    <a href="../criareventos/criareventos.html" id="criar-eventos" class="dropdown-item">
                        <i class="fas fa-calendar-plus"></i> Criar eventos
                    </a>

                    <a href="../criareventos/criareventos.html" id="cadastrar-estabelecimento" class="dropdown-item">
                        <i class="fas fa-store"></i> Cadastrar estabelecimento
                    </a>

                    <a href="../dashboard/dashboard.html" id="dashboard" class="dropdown-item">
                        <i class="fas fa-chart-line"></i> Dashboard
                    </a>

                    <hr>

                    <a href="../Contato/contato.html" id="contato" class="dropdown-item">
                        <i class="fas fa-headset"></i> Central de ajuda
                    </a>

                    <hr>

                    <a href="../login/logout.html" id="logout" class="dropdown-item logout-btn">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </a>

                </div>

            </div>

        </div>

    </nav>

    <div class="bottom-gradient-bar"></div>
    <div class="header-placeholder-fixo"></div>

</header>

<!-- OVERLAY DE CIDADE -->
<div id="city-overlay" class="overlay"></div>

<!-- CARD DE LOCALIZAÇÃO -->
<div id="city-card" class="city-card">

    <div class="card-header">
        <h3>Localização</h3>
        <span id="close-card">&times;</span>
    </div>

    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="city-search" placeholder="Onde?">
    </div>

    <div class="use-location" id="use-location">
        <i class="fas fa-location-arrow"></i>
        <div><strong>Usar minha localização atual</strong></div>
    </div>

    <ul class="city-list" id="city-list">
        <li data-city="Goiânia"><i class="fas fa-map-marker-alt"></i> Goiânia</li>
        <li data-city="Aparecida de Goiânia"><i class="fas fa-map-marker-alt"></i> Aparecida de Goiânia</li>
        <li data-city="Caldas Novas"><i class="fas fa-map-marker-alt"></i> Caldas Novas</li>
    </ul>

</div>

<script src="../JS/header.js"></script>
