<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presença Confirmada | Rolês</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/PresencaConfirmada.css">


</head>

<body>

    <header>
        <iframe id="site-header" src="../header/header.html" frameborder="0" scrolling="no" width="100%" height="60"
            style="position: sticky; top: 0; left: 0; z-index: 999999999;"></iframe>
    </header>

    <main>
        <div class="container-confirmacao">

            <div class="icone-check-container">
                <svg class="icone-check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill="currentColor"
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z" />
                </svg>
            </div>

            <h1 class="titulo-confirmacao">Presença Confirmada!</h1>
            <p class="mensagem-confirmacao">Você confirmou presença no evento. Nos vemos lá! 👋</p>

            <div class="card-lembrete">
                <h3 style="color: #444; font-size: 16px; margin-bottom: 10px;">Lembre-se</h3>
                <ul>
                    <li>• Chegue 15 minutos antes do evento começar</li>
                    <li>• Enviamos um email com todos os detalhes</li>
                    <li>• Este não é um ingresso, apenas confirmação de interesse!</li>
                </ul>
            </div>

            <div class="acoes-finais">
                <a href="../index.html" class="botao-acao botao-explorar" role="button">
                    Explorar Mais Eventos
                </a>
                <button class="botao-acao botao-compartilhar" type="button">
                    <svg class="icone-compartilhar" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.47 1.22.77 1.96.77 2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4c0 .24.04.47.09.7L7.05 11.08C6.51 10.61 5.83 10.32 5.08 10.32c-2.21 0-4 1.79-4 4s1.79 4 4 4c.75 0 1.43-.29 1.96-.77l7.05 4.11c-.05.23-.09.46-.09.7 0 2.21 1.79 4 4 4s4-1.79 4-4-1.79-4-4-4z" />
                    </svg>
                    Compartilhar
                </button>
            </div>

        </div>
    </main>

    <footer>
        <iframe src="../footer/footer.html" frameborder="0" scrolling="no" width="100%" height="auto"></iframe>
    </footer>

    <script src="../JS/PresencaConfirmada.js"></script>

</body>

</html>
