<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login - Rolês</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/login.css">

</head>

<body>
    <header>
        <div id="header-container"></div>
    </header>


    <main>
        <div class="login-container">
            <div class="login-box">
                <h1>Entrar no Rolês</h1>
                <p id="main-text" class="text-muted">
                    Encontre os melhores lugares para sair e se divertir
                </p>

                <form id="login-form">
                    <input type="email" id="email" placeholder="E-mail" required>
                    <div class="password-container">
                        <input type="password" id="password" placeholder="Senha" required>

                        <span class="material-symbols-outlined" id="togglePassword">
                            visibility
                        </span>
                    </div>
                    <button type="submit" class="login-btn">Entrar</button>
                </form>

                <div class="divider">
                    <span>ou</span>
                </div>


                <p id="sub-text" class="small">Entre rapidamente com</p>

                <div class="social-login">
                    <button><i class="fab fa-google"></i></button>
                    <button><i class="fab fa-facebook-f"></i></button>
                </div>


                <p class="register-link">
                    Não tem conta? <a href="../cadastro/cadastro.html">Cadastre-se</a>
                </p>
            </div>
        </div>
    </main>

    <script src="../js/footer.js" defer></script>
    <script src="../js/loadHeader.js"></script>

    <script src="../js/Login.js"></script>

</body>

</html>
