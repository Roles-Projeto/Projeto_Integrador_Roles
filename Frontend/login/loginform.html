<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/frontend/css/login.css">

    <title>Login</title>
</head>

<body>

    <div class="login-container">
        <div class="login-box">

            <h1>Entrar no Rolês</h1>

            <p id="main-text" class="text-muted">
                Encontre os melhores lugares para sair e se divertir
            </p>
            <form id="login-form" autocomplete="off">

                <input type="email" id="email" placeholder="E-mail" required>

                <input type="password" id="password" placeholder="Senha" required>

                <button type="submit" class="login-btn">
                    Entrar
                </button>

                 <div class="divider">
                    <span>ou</span>
                </div>


                <p id="sub-text" class="small">
                    Entre rapidamente com
                </p>

                <div class="social-login">

                    <button class="google-btn">
                        <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google"
                            class="social-icon">
                    </button>

                </div>

               

            </form>

            <p class="register-link">
                Não tem conta?
                <a href="/frontend/Cadastro/cadastro.html" id="btnCadastrar">
                    Cadastrar
                </a>
            </p>

        </div>
    </div>

    <script src="/frontend/js/config.js"></script>
    <script src="/frontend/js/Login.js"></script>

 



</body>

</html>
