<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compra Confirmada — Rolês</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(108, 43, 217, 0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .checkmark {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6c2bd9, #9b59b6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            animation: pop 0.4s ease 0.2s both;
        }

        @keyframes pop {
            from { transform: scale(0); }
            to   { transform: scale(1); }
        }

        h1 {
            font-size: 26px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #777;
            font-size: 15px;
            margin-bottom: 32px;
        }

        .info-box {
            background: #f5f0ff;
            border-left: 4px solid #6c2bd9;
            border-radius: 10px;
            padding: 20px;
            text-align: left;
            margin-bottom: 24px;
        }

        .info-box p {
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .info-box p:last-child { margin-bottom: 0; }

        .info-box strong { color: #1a1a2e; }

        .total {
            font-size: 28px;
            font-weight: 700;
            color: #6c2bd9;
            margin-bottom: 6px;
        }

        .pagamento-label {
            font-size: 13px;
            color: #999;
            margin-bottom: 24px;
        }

        .email-notice {
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 13px;
            color: #2e7d32;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .btn {
            display: block;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6c2bd9, #9b59b6);
            color: #fff;
            border: none;
            margin-bottom: 12px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 43, 217, 0.35);
        }

        .btn-secondary {
            background: transparent;
            color: #6c2bd9;
            border: 2px solid #6c2bd9;
        }

        .btn-secondary:hover { background: #f5f0ff; }

        .pedido-id {
            font-size: 12px;
            color: #bbb;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="checkmark">✓</div>

    <h1>Compra Confirmada!</h1>
    <p class="subtitle">Seu ingresso foi gerado com sucesso.</p>

    <div class="info-box">
        <p>🎉 <strong id="nome-evento">—</strong></p>
        <p>📅 <strong id="data-evento">—</strong> às <strong id="hora-evento">—</strong></p>
        <p>📌 <strong id="local-evento">—</strong></p>
        <p>🎟️ <strong id="tipo-ingresso">—</strong> × <strong id="qtd">—</strong></p>
    </div>

    <div class="total" id="total-pago">R$ 0,00</div>
    <p class="pagamento-label">
        Forma de pagamento: <strong id="forma-pagamento">—</strong>
    </p>

    <div class="email-notice">
        📧 Um e-mail com seu ingresso em PDF foi enviado para o seu endereço cadastrado.
    </div>

    <a id="btn-ver-ingressos" href="#" class="btn btn-primary">
        🎟️ Ver Meus Ingressos
    </a>
    <a id="btn-voltar" href="#" class="btn btn-secondary">
        Voltar ao início
    </a>

    <p class="pedido-id" id="pedido-id"></p>
</div>

<script>
    const dados = JSON.parse(sessionStorage.getItem("compraConfirmada") || "{}");

    // ── Detecta a raiz do Frontend dinamicamente ──────────────
    // window.location.pathname ex: /Frontend/ResumoDaCompra/CompraConfirmada.html
    const pathParts   = window.location.pathname.split("/");
    const frontendIdx = pathParts.findIndex(p => p.toLowerCase() === "frontend");
    const frontendBase = frontendIdx !== -1
        ? "/" + pathParts.slice(0, frontendIdx + 1).join("/").replace(/^\//, "")
        : "/Frontend";

    // ── Monta os links corretos ────────────────────────────────
    document.getElementById("btn-ver-ingressos").href =
        `${frontendBase}/perfil/perfil.html?section=ingressos`;

    document.getElementById("btn-voltar").href =
        `${frontendBase}/index.html`;

    // ── Redireciona se não há compra na sessão ─────────────────
    if (!dados.pedido_id) {
        window.location.href = `${frontendBase}/index.html`;
    }

    // ── Preenche os dados ──────────────────────────────────────
    document.getElementById("nome-evento").textContent   = dados.nome         || "—";
    document.getElementById("data-evento").textContent   = dados.data         || "—";
    document.getElementById("hora-evento").textContent   = dados.hora         || "—";
    document.getElementById("local-evento").textContent  = dados.local        || "—";
    document.getElementById("tipo-ingresso").textContent = dados.ingressoNome || "—";
    document.getElementById("qtd").textContent           = dados.quantidade   || "—";
    document.getElementById("pedido-id").textContent     = `Pedido #${dados.pedido_id}`;

    const formas = {
        credito: "Cartão de Crédito",
        pix:     "PIX",
        boleto:  "Boleto Bancário"
    };
    document.getElementById("forma-pagamento").textContent =
        formas[dados.forma_pagamento] || dados.forma_pagamento || "—";

    const total = new Intl.NumberFormat("pt-BR", {
        style: "currency", currency: "BRL"
    }).format(dados.totalPago || 0);
    document.getElementById("total-pago").textContent = total;
</script>
</body>
</html>
